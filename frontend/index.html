<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Catalog</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght=600;700&family=DM+Sans:wght=400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0f0f13; color: #e8e6f0; min-height: 100vh; padding: 2rem; }
    header { margin-bottom: 2rem; }
    header h1 { font-family: 'Syne', sans-serif; font-size: 2rem; letter-spacing: -0.03em; color: #fff; }
    header p { color: #888; margin-top: 0.25rem; font-size: 0.875rem; }
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #2a2a35; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead tr { background: #1a1a24; border-bottom: 1px solid #2a2a35; }
    thead th { padding: 0.85rem 1rem; text-align: left; font-family: 'Syne', sans-serif; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: #888; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #1e1e28; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #18181f; }
    td { padding: 0.85rem 1rem; vertical-align: middle; color: #ccc; }
    .title { font-weight: 500; color: #f0eeff; }
    .desc { font-size: 0.75rem; color: #666; margin-top: 2px; max-width: 240px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge { background: #252535; border: 1px solid #35354a; color: #a89fff; padding: 2px 10px; border-radius: 99px; font-size: 0.72rem; font-weight: 500; white-space: nowrap; }
    .price { font-weight: 500; color: #7cffc4; white-space: nowrap; }
    .discount { background: #7cffc422; color: #7cffc4; border-radius: 4px; padding: 1px 5px; font-size: 0.7rem; margin-left: 4px; }
    .low-stock { color: #ff6b6b; font-weight: 500; }
    .header-controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .search-container { display: flex; gap: 0.5rem; align-items: center; flex: 1; }
    .search-input { flex: 1; max-width: 400px; padding: 0.75rem 1rem; background: #1a1a24; border: 1px solid #2a2a35; border-radius: 8px; color: #e8e6f0; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; transition: border-color 0.2s; }
    .search-input:focus { outline: none; border-color: #7cffc4; box-shadow: 0 0 0 3px rgba(124, 255, 196, 0.1); }
    .search-input::placeholder { color: #777; }
    .btn-add-product { padding: 0.75rem 1.5rem; background: #7cffc4; border: none; border-radius: 8px; color: #0f0f13; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.875rem; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-add-product:hover { background: #5fe8a8; transform: translateY(-1px); }
    .btn-add-product:active { transform: translateY(0); }
    .btn-add-product:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content { background-color: #1a1a24; margin: 10% auto; padding: 2rem; border: 1px solid #2a2a35; border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; animation: slideIn 0.3s; }
    @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-header h2 { font-family: 'Syne', sans-serif; font-size: 1.5rem; color: #fff; margin: 0; }
    .close { font-size: 1.5rem; font-weight: bold; color: #888; cursor: pointer; transition: color 0.2s; }
    .close:hover { color: #fff; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #ccc; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem; background: #252535; border: 1px solid #35354a; border-radius: 6px; color: #e8e6f0; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #7cffc4; box-shadow: 0 0 0 3px rgba(124, 255, 196, 0.1); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem; }
    .btn-submit { padding: 0.75rem 1.5rem; background: #7cffc4; border: none; border-radius: 6px; color: #0f0f13; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.875rem; cursor: pointer; transition: background 0.2s; }
    .btn-submit:hover { background: #5fe8a8; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-cancel { padding: 0.75rem 1.5rem; background: #35354a; border: 1px solid #2a2a35; border-radius: 6px; color: #ccc; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.875rem; cursor: pointer; transition: background 0.2s; }
    .btn-cancel:hover { background: #2a2a35; }
    .form-error { color: #ff6b6b; font-size: 0.8rem; margin-top: 0.4rem; display: none; }
    @media (max-width: 600px) { body { padding: 1rem; } .desc { display: none; } .search-container { max-width: 100%; } .search-input { max-width: 100%; } }
  </style>
</head>
<body>
  <header>
    <h1>Product Catalog</h1>
    <p id="productCount">Loading...</p>
    <div class="header-controls">
      <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="Search products by name, category..." onkeyup="filterTable()"/>
      </div>
      <button class="btn-add-product" id="addProductBtn" onclick="openAddProductModal()">+ Add Product</button>
    </div>
  </header>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Product</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Mfg Date</th>
          <th>Expiry Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="productTableBody"></tbody>
    </table>
  </div>

  <div id="addProductModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add New Product</h2>
        <span class="close" onclick="closeAddProductModal()">&times;</span>
      </div>
      <form id="addProductForm" onsubmit="submitAddProduct(event)">
        <div class="form-group"><label for="title">Product Name *</label><input type="text" id="title" name="title" required></div>
        <div class="form-group"><label for="description">Description</label><textarea id="description" name="description"></textarea></div>
        <div class="form-group"><label for="category">Category *</label><input type="text" id="category" name="category" required></div>
        <div class="form-group"><label for="price">Price (₹) *</label><input type="number" id="price" name="price" min="0" step="0.01" required></div>
        <div class="form-group"><label for="discount">Discount (%)</label><input type="number" id="discount" name="discount" min="0" max="100" step="0.01"></div>
        <div class="form-group"><label for="qoh">Stock Quantity *</label><input type="number" id="qoh" name="qoh" min="0" required></div>
        <div class="form-group"><label for="mfgDate">Manufacturing Date</label><input type="date" id="mfgDate" name="mfgDate"></div>
        <div class="form-group"><label for="expiryDate">Expiry Date</label><input type="date" id="expiryDate" name="expiryDate"></div>
        <div class="form-error" id="formError"></div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="closeAddProductModal()">Cancel</button>
          <button type="submit" class="btn-submit" id="submitBtn">Add Product</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:3000/api/products";
    let allProducts = [];

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      if (isNaN(d)) return dateStr;
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function buildRow(p, index) {
      const discountVal = parseFloat(p.Discount) || 0;
      const discountBadge = discountVal > 0 ? `<span class="discount">-${discountVal}%</span>` : '';
      const stockClass = p.QOH <= 10 ? 'low-stock' : '';
      return `<tr data-index="${index}">
        <td>${p.Sno}</td>
        <td><div class="title">${p.Title}</div><div class="desc">${p.Description || ''}</div></td>
        <td><span class="badge">${p.Category}</span></td>
        <td class="price">₹${Number(p.Price).toFixed(2)}${discountBadge}</td>
        <td class="${stockClass}">${p.QOH}</td>
        <td>${formatDate(p.MfgDate)}</td>
        <td>${formatDate(p.ExpiryDate)}</td>
        <td>
          <button onclick="deleteProduct('${p.Sno}')" style="background:#ff6b6b;color:white;border:none;padding:6px 10px;border-radius:5px;cursor:pointer;">
            Delete
          </button>
        </td>
      </tr>`;
    }

    function renderTable(products) {
      const tbody = document.getElementById('productTableBody');
      const rows = products.map((p, i) => buildRow(p, i)).join('');
      const total = products.length;
      tbody.innerHTML = rows + `<tr><td colspan="7"></td><td style="text-align:right;color:#888;font-size:0.75rem;">Total: ${total}</td></tr>`;
      document.getElementById('productCount').textContent = `${total} products found`;
    }

    function filterTable() {
      const term = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!term) { renderTable(allProducts); return; }
      const filtered = allProducts.filter(p =>
        (p.Title || '').toLowerCase().includes(term) ||
        (p.Category || '').toLowerCase().includes(term) ||
        (p.Description || '').toLowerCase().includes(term)
      );
      renderTable(filtered);
    }

    async function loadProducts() {
      try {
        const res = await fetch(API_BASE);
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const data = await res.json();
        allProducts = Array.isArray(data) ? data : (data.products || []);
        renderTable(allProducts);
      } catch (err) {
        console.error("Failed to load products:", err);
        document.getElementById('productCount').textContent =
          "Could not load products (is your API server running on :3000?)";
      }
    }
    window.addEventListener('DOMContentLoaded', loadProducts);

    function openAddProductModal() { document.getElementById('addProductModal').style.display = 'block'; }
    function closeAddProductModal() {
      document.getElementById('addProductModal').style.display = 'none';
      document.getElementById('addProductForm').reset();
      const errEl = document.getElementById('formError');
      errEl.style.display = 'none';
      errEl.textContent = '';
    }
    window.onclick = function(event) {
      const modal = document.getElementById('addProductModal');
      if (event.target === modal) modal.style.display = 'none';
    };

    async function submitAddProduct(event) {
      event.preventDefault();
      const formData = new FormData(document.getElementById('addProductForm'));
      const data = Object.fromEntries(formData);

      const newProduct = {
        Sno: allProducts.length + 1,
        Title: data.title,
        Category: data.category,
        Description: data.description || '',
        Price: parseFloat(data.price),
        Discount: data.discount ? `${data.discount}%` : '0%',
        QOH: parseInt(data.qoh, 10),
        MfgDate: data.mfgDate || null,
        ExpiryDate: data.expiryDate || null
      };

      const submitBtn = document.getElementById('submitBtn');
      const errEl = document.getElementById('formError');
      errEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';

      try {
        const res = await fetch(API_BASE, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(newProduct)
        });
        if (!res.ok) throw new Error(`Server returned ${res.status}`);

        const saved = await res.json();
        const savedProduct = (saved && saved.Title) ? saved : newProduct;

        allProducts.push(savedProduct);
        renderTable(allProducts);
        closeAddProductModal();
      } catch (err) {
        console.error(err);
        errEl.textContent = "Failed to save product. Check that your API server is running at " + API_BASE + ".";
        errEl.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add Product';
      }
    }

    async function deleteProduct(id) {
      const confirmDelete = confirm("Are you sure you want to delete this product?");
      if (!confirmDelete) return;

      try {
        const res = await fetch(`${API_BASE}/${id}`, {
          method: "DELETE"
        });

        if (!res.ok) throw new Error("Delete failed");

        allProducts = allProducts.filter(p => p.Sno != id);
        renderTable(allProducts);
        alert("Product deleted successfully");
      } catch (err) {
        console.error(err);
        alert("Failed to delete product from API");
      }
    }
  </script>
</body>
</html>
