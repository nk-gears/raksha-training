<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Catalog</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f0f13;
      color: #e8e6f0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      letter-spacing: -0.03em;
      color: #fff;
    }

    header p {
      color: #888;
      margin-top: 0.25rem;
      font-size: 0.875rem;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #2a2a35;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead tr {
      background: #1a1a24;
      border-bottom: 1px solid #2a2a35;
    }

    thead th {
      padding: 0.85rem 1rem;
      text-align: left;
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #1e1e28;
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: #18181f; }

    td {
      padding: 0.85rem 1rem;
      vertical-align: middle;
      color: #ccc;
    }

    .title {
      font-weight: 500;
      color: #f0eeff;
    }

    .desc {
      font-size: 0.75rem;
      color: #666;
      margin-top: 2px;
      max-width: 240px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      background: #252535;
      border: 1px solid #35354a;
      color: #a89fff;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .price {
      font-weight: 500;
      color: #7cffc4;
      white-space: nowrap;
    }

    .discount {
      background: #7cffc422;
      color: #7cffc4;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.7rem;
      margin-left: 4px;
    }

    .low-stock {
      color: #ff6b6b;
      font-weight: 500;
    }

    .header-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .search-container {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex: 1;
    }

    .search-input {
      flex: 1;
      max-width: 400px;
      padding: 0.75rem 1rem;
      background: #1a1a24;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      color: #e8e6f0;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: #7cffc4;
      box-shadow: 0 0 0 3px rgba(124, 255, 196, 0.1);
    }

    .search-input::placeholder {
      color: #e65454;
    }

    .search-results {
      color: #4cc98f;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .btn-add-product {
      padding: 0.75rem 1.5rem;
      background: #7cffc4;
      border: none;
      border-radius: 8px;
      color: #0f0f13;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-add-product:hover {
      background: #5fe8a8;
      transform: translateY(-1px);
    }

    .btn-add-product:active {
      transform: translateY(0);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      animation: fadeIn 0.2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background-color: #1a1a24;
      margin: 10% auto;
      padding: 2rem;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      animation: slideIn 0.3s;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      color: #fff;
      margin: 0;
    }

    .close {
      font-size: 1.5rem;
      font-weight: bold;
      color: #888;
      cursor: pointer;
      transition: color 0.2s;
    }

    .close:hover {
      color: #fff;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      color: #ccc;
      font-weight: 500;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem;
      background: #252535;
      border: 1px solid #35354a;
      border-radius: 6px;
      color: #e8e6f0;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #7cffc4;
      box-shadow: 0 0 0 3px rgba(124, 255, 196, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .btn-submit {
      padding: 0.75rem 1.5rem;
      background: #7cffc4;
      border: none;
      border-radius: 6px;
      color: #0f0f13;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover {
      background: #5fe8a8;
    }

    .btn-cancel {
      padding: 0.75rem 1.5rem;
      background: #35354a;
      border: 1px solid #2a2a35;
      border-radius: 6px;
      color: #ccc;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover {
      background: #2a2a35;
    }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .desc { display: none; }
      .search-container { max-width: 100%; }
      .search-input { max-width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Product Catalog</h1>
    <p>${products.length} products found</p>
    <div class="header-controls">
      <div class="search-container">
        <input 
          type="text" 
          class="search-input" 
          id="searchInput" 
          placeholder="Search products by name, category..."
          onkeyup="filterTable()"
        />
      </div>
      <button class="btn-add-product" onclick="openAddProductModal()">+ Add Product</button>
    </div>
  </header>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Product</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Mfg Date</th>
          <th>Expiry Date</th>
        </tr>
      </thead>
      <tbody>${rows}
      <tr colspan="7"><td align="right" >Total :${totalProducts} </td></tr>
      </tbody>
      
    </table>
  </div>

  <!-- Add Product Modal -->
  <div id="addProductModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add New Product</h2>
        <span class="close" onclick="closeAddProductModal()">&times;</span>
      </div>
      <form id="addProductForm" onsubmit="submitAddProduct(event)">
        <div class="form-group">
          <label for="title">Product Name *</label>
          <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description"></textarea>
        </div>
        <div class="form-group">
          <label for="category">Category *</label>
          <input type="text" id="category" name="category" required>
        </div>
        <div class="form-group">
          <label for="price">Price (₹) *</label>
          <input type="number" id="price" name="price" min="0" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="discount">Discount (%)</label>
          <input type="number" id="discount" name="discount" min="0" max="100" step="0.01">
        </div>
        <div class="form-group">
          <label for="qoh">Stock Quantity *</label>
          <input type="number" id="qoh" name="qoh" min="0" required>
        </div>
        <div class="form-group">
          <label for="mfgDate">Manufacturing Date</label>
          <input type="date" id="mfgDate" name="mfgDate">
        </div>
        <div class="form-group">
          <label for="expiryDate">Expiry Date</label>
          <input type="date" id="expiryDate" name="expiryDate">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="closeAddProductModal()">Cancel</button>
          <button type="submit" class="btn-submit">Add Product</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function filterTable() {
      const searchInput = document.getElementById('searchInput');
      const searchTerm = searchInput.value.toLowerCase();
      const tableBody = document.querySelector('tbody');
      const rows = tableBody.querySelectorAll('tr:not(:last-child)');
      let visibleCount = 0;

      rows.forEach(row => {
        const productCell = row.querySelector('.title');
        const categoryCell = row.querySelector('.badge');
        
        if (!productCell) return; // Skip the total row
        
        const productText = productCell.textContent.toLowerCase();
        const categoryText = categoryCell ? categoryCell.textContent.toLowerCase() : '';
        
        if (productText.includes(searchTerm) || categoryText.includes(searchTerm)) {
          row.style.display = '';
          visibleCount++;
        } else {
          row.style.display = 'none';
        }
      });

      // Update the product count
      const headerP = document.querySelector('header p');
      if (headerP) {
        headerP.textContent = visibleCount + ' products found';
      }
    }

    function openAddProductModal() {
      document.getElementById('addProductModal').style.display = 'block';
    }

    function closeAddProductModal() {
      document.getElementById('addProductModal').style.display = 'none';
      document.getElementById('addProductForm').reset();
    }

    window.onclick = function(event) {
      const modal = document.getElementById('addProductModal');
      if (event.target == modal) {
        modal.style.display = 'none';
      }
    }

    function submitAddProduct(event) {
      event.preventDefault();
      
      const formData = new FormData(document.getElementById('addProductForm'));
      const data = Object.fromEntries(formData);
      
      // Show loading state
      const submitBtn = event.target.querySelector('[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Adding...';
      submitBtn.disabled = true;

      google.script.run.withSuccessHandler((result) => {
        if (result.success) {
          alert('Product added successfully!');
          closeAddProductModal();
          location.reload(); // Refresh to show new product
        } else {
          alert('Error: ' + result.message);
        }
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }).withFailureHandler((error) => {
        alert('Error adding product: ' + error);
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }).addProduct(data);
    }
  </script>
</body>
</html>
